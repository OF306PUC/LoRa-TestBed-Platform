[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "lora-testbed/+/device",
    "lora-testbed/+/environment"
  ]
  qos = 0
  connection_timeout = "30s"
  data_format = "json"
  json_time_key = "timestamp"
  json_time_format = "unix"
  tag_keys = ["node_id", "sensor"]

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "lora_nodes_sensors_db"
  username = "admin"
  password = "admin"
  retention_policy = ""
  write_consistency = "any"
  timeout = "5s"